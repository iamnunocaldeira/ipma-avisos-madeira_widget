<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avisos Sumário | Madeira</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:transparent;font-family:Arial,sans-serif}
body{display:flex;gap:4px;padding:0}

.region-widget{
  width:100px;height:100px;
  background:#fff;
  border:1px solid #ccc;
  border-radius:4px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  flex-shrink:0;
}
.region-name{
  font-size:7.5px;font-weight:700;color:#222;
  text-align:center;
  padding:2px 2px 1px;
  border-bottom:1px solid #e0e0e0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.2;
  flex-shrink:0;
}
.icon-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(2,1fr);
  flex:1;
}
.icon-cell{
  display:flex;align-items:center;justify-content:center;
  border-right:1px solid rgba(0,0,0,.07);
  border-bottom:1px solid rgba(0,0,0,.07);
  padding:2px;
}
.icon-cell:nth-child(4n){border-right:none}
.icon-cell:nth-child(n+5){border-bottom:none}
.icon-cell svg{width:100%;height:100%;max-width:18px;max-height:18px}

.bg-green {background:#4caf50}
.bg-yellow{background:#fdd835}
.bg-orange{background:#ff8c00}
.bg-red   {background:#e53935}
.bg-none  {background:#fff}

/* ícone branco sobre fundo colorido, preto sobre verde/amarelo */
.bg-green  .icon-svg,
.bg-yellow .icon-svg{color:#333}
.bg-orange .icon-svg,
.bg-red    .icon-svg{color:#fff}
.bg-none   .icon-svg{color:#bbb}
</style>
</head>

const PHENOMENA=['Trovoada','Precipitação','Vento','Agitação Marítima','Neve','Tempo Frio','Tempo Quente','Nevoeiro'];
const TYPE_MAP={'Rain':'Precipitação','Wind':'Vento','Fog':'Nevoeiro','Snow/Ice':'Neve','Thunderstorm':'Trovoada','Coastal Event':'Agitação Marítima','High Temperature':'Tempo Quente','Low Temperature':'Tempo Frio'};
const REGIONS={MRM:'Regiões Montanhosas',MCS:'Costa Sul'};
const LVL={red:4,orange:3,yellow:2,green:1};
const BG={green:'bg-green',yellow:'bg-yellow',orange:'bg-orange',red:'bg-red'};

function normType(t){return TYPE_MAP[t]||t}
function normLevel(l){return(l||'green').toLowerCase()}

function maxLevelForPhenomenon(phenomenon, warnings){
  let max='green';
  warnings.forEach(w=>{
    if(normType(w.awarenessTypeName)!==phenomenon)return;
    const lv=normLevel(w.awarenessLevelID);
    if((LVL[lv]||0)>(LVL[max]||0))max=lv;
  });
  return max;
}

function buildWidget(code, name, warnings){
  const cellsHtml=PHENOMENA.map(p=>{
    const lv=maxLevelForPhenomenon(p,warnings);
    const bgCls=BG[lv]||'bg-none';
    return`<div class="icon-cell ${bgCls}" title="${p}"><span class="icon-svg" style="display:flex;width:18px;height:18px;color:inherit">${ICONS[p]||''}</span></div>`;
  }).join('');

  return`<div class="region-widget">
    <div class="region-name" title="${name}">${name}</div>
    <div class="icon-grid">${cellsHtml}</div>
  </div>`;
}

async function load(){
  const content=document.getElementById('content');
  content.style.display='flex';
  content.style.gap='4px';
  try{
    const res=await fetch('https://api.ipma.pt/open-data/forecast/warnings/warnings_www.json');
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    const rd={MRM:[],MCS:[]};
    data.forEach(w=>{if(rd.hasOwnProperty(w.idAreaAviso))rd[w.idAreaAviso].push(w)});
    content.innerHTML=Object.entries(REGIONS).map(([code,name])=>buildWidget(code,name,rd[code])).join('');
    if(window.parent!==window)
      window.parent.postMessage({type:'resize',height:document.body.scrollHeight},'*');
  }catch(e){
    content.innerHTML=`<div style="font-size:10px;color:#900;padding:4px">Erro: ${e.message}</div>`;
  }
}

load();
setInterval(load,10*60*1000);
</script>
